{% extends 'admin_panel/base.html' %}

{% block active_menu %}active{% endblock %}

{% block admin_content %}
<div class="d-flex align-items-center pt-3 pb-2 mb-3 border-bottom">
    <a href="{% url 'admin_panel:menu_list' %}" class="btn btn-sm btn-outline-custom me-3"><i class="bi bi-arrow-left"></i> Menu</a>
    <h1 class="h2 fw-bold text-dark m-0">Add New Dish</h1>
</div>

<div class="row justify-content-start">
    <div class="col-md-8">
        <div class="card glass-card p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle text-primary"></i> Create Food Item</h5>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label fw-semibold">Dish Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="name" required class="form-control" placeholder="e.g. Pepperoni Pizza">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="category" class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                        <select name="category" id="category" required class="form-select">
                            <option value="" disabled selected>Select category...</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">Description</label>
                    <textarea name="description" id="description" rows="3" class="form-control" placeholder="Explain the ingredients or details of this dish..."></textarea>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="price" class="form-label fw-semibold">Price (₹) <span class="text-danger">*</span></label>
                        <input type="number" name="price" id="price" required step="0.01" min="0.00" class="form-control" placeholder="e.g. 14.99">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="image" class="form-label fw-semibold">Dish Image <span class="text-danger">*</span></label>
                        <input type="file" name="image" id="image" accept="image/*" required class="form-control">
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary-custom fw-bold px-4 py-2">
                        <i class="bi bi-check2"></i> Add Dish
                    </button>
                    <a href="{% url 'admin_panel:menu_list' %}" class="btn btn-light border-1 px-4 py-2">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
