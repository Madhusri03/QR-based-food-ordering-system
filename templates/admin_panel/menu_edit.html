{% extends 'admin_panel/base.html' %}

{% block active_menu %}active{% endblock %}

{% block admin_content %}
<div class="d-flex align-items-center pt-3 pb-2 mb-3 border-bottom">
    <a href="{% url 'admin_panel:menu_list' %}" class="btn btn-sm btn-outline-custom me-3"><i class="bi bi-arrow-left"></i> Menu</a>
    <h1 class="h2 fw-bold text-dark m-0">Edit Dish</h1>
</div>

<div class="row justify-content-start">
    <div class="col-md-8">
        <div class="card glass-card p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-pencil-square text-primary"></i> Modify Dish: {{ food.name }}</h5>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label fw-semibold">Dish Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="name" value="{{ food.name }}" required class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="category" class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                        <select name="category" id="category" required class="form-select">
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if food.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">Description</label>
                    <textarea name="description" id="description" rows="3" class="form-control">{{ food.description }}</textarea>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="price" class="form-label fw-semibold">Price (₹) <span class="text-danger">*</span></label>
                        <input type="number" name="price" id="price" value="{{ food.price }}" required step="0.01" min="0.00" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="image" class="form-label fw-semibold">Change Image <span class="text-secondary">(Optional)</span></label>
                        <input type="file" name="image" id="image" accept="image/*" class="form-control mb-2">
                        {% if food.image %}
                            <div class="d-flex align-items-center bg-light p-2 rounded" style="border: 1px solid rgba(0,0,0,0.05);">
                                <img src="{{ food.image.url }}" alt="{{ food.name }}" class="rounded me-2" style="width: 50px; height: 40px; object-fit: cover;">
                                <span class="small text-secondary text-truncate">Current: {{ food.image.name }}</span>
                            </div>
                        {% endif %}
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary-custom fw-bold px-4 py-2">
                        Update Dish
                    </button>
                    <a href="{% url 'admin_panel:menu_list' %}" class="btn btn-light border-1 px-4 py-2">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
