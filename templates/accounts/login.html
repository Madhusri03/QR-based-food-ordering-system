{% extends 'base.html' %}

{% block title %}Staff Login - Lumaro Cafe & Bistro{% endblock %}

{% block content %}
<div class="container my-5 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-qr-code-scan text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">Smart SDine</h2>
                <p class="text-secondary">Restaurant Management System</p>
            </div>
            
            <div class="card glass-card p-4">
                <div class="card-body">
                    <h4 class="card-title fw-bold mb-4 text-center">Staff Login</h4>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-secondary"></i></span>
                                <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control border-start-0 ps-0" placeholder="Enter username">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="id_password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-secondary"></i></span>
                                <input type="password" name="password" required id="id_password" class="form-control border-start-0 ps-0" placeholder="Enter password">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Log In
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="{% url 'home' %}" class="text-primary text-decoration-none fw-semibold">
                    <i class="bi bi-arrow-left-short"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
